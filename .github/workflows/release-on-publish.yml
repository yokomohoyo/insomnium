name: Release On Publish

# Fires when a GitHub Release is published (via the UI or `gh release create`),
# builds installers/packages for all 3 OSes, and uploads them as assets to that
# release. Also supports manual re-runs via workflow_dispatch with an existing
# tag name.
#
# Coexists with the legacy `release-build.yml` / `release-publish.yml` 3-step
# flow — neither workflow disables the other.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag of an existing release to (re)build artifacts for
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write  # required to upload assets to the release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            csc_link_secret: DESIGNER_MAC_CSC_LINK
            csc_key_password_secret: DESIGNER_MAC_CSC_KEY_PASSWORD
          - os: windows-latest
            csc_link_secret: DESIGNER_WINDOWS_CSC_LINK
            csc_key_password_secret: DESIGNER_WINDOWS_CSC_KEY_PASSWORD
          - os: ubuntu-latest
            csc_link_secret: ""
            csc_key_password_secret: ""

    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install packages
        run: npm ci

      - name: Package app (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: npm run app-package
        env:
          NODE_OPTIONS: "--max_old_space_size=6144"
          APPLE_ID: ${{ secrets.DESIGNER_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESIGNER_APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESIGNER_APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets[matrix.csc_link_secret] }}
          CSC_KEY_PASSWORD: ${{ secrets[matrix.csc_key_password_secret] }}

      - name: Package app (Windows / Linux)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: npm run app-package
        env:
          NODE_OPTIONS: "--max_old_space_size=6144"
          CSC_LINK: ${{ secrets[matrix.csc_link_secret] }}
          CSC_KEY_PASSWORD: ${{ secrets[matrix.csc_key_password_secret] }}

      - name: List built artifacts
        shell: bash
        run: ls -lh packages/insomnia/dist/ || true

      # Upload one set of build outputs as a workflow artifact too — handy for
      # debugging when the release-upload step fails.
      - name: Upload workflow artifacts (debug copy)
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: ${{ matrix.os }}-dist-${{ github.run_number }}
          retention-days: 14
          path: |
            packages/insomnia/dist/*.dmg
            packages/insomnia/dist/*.zip
            packages/insomnia/dist/*.exe
            packages/insomnia/dist/squirrel-windows/*.exe
            packages/insomnia/dist/squirrel-windows/*.nupkg
            packages/insomnia/dist/squirrel-windows/RELEASES
            packages/insomnia/dist/*.snap
            packages/insomnia/dist/*.rpm
            packages/insomnia/dist/*.deb
            packages/insomnia/dist/*.AppImage
            packages/insomnia/dist/*.tar.gz

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(
            packages/insomnia/dist/*.dmg
            packages/insomnia/dist/*.zip
            packages/insomnia/dist/*.exe
            packages/insomnia/dist/squirrel-windows/*.exe
            packages/insomnia/dist/squirrel-windows/*.nupkg
            packages/insomnia/dist/*.snap
            packages/insomnia/dist/*.rpm
            packages/insomnia/dist/*.deb
            packages/insomnia/dist/*.AppImage
            packages/insomnia/dist/*.tar.gz
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No artifacts found to upload for ${{ matrix.os }}"
            exit 0
          fi
          echo "Uploading ${#files[@]} files to release $TAG:"
          printf '  %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --repo "${{ github.repository }}" --clobber
