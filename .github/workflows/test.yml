name: Test

on:
  merge_group:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize

# Pushes to a PR branch trigger both `push` and `pull_request` events.
# Cancel the older duplicate run so we don't burn double CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  Lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install packages
        run: npm ci

      - name: Lint
        run: npm run lint

      # - name: Lint markdown
      #   run: npm run lint:markdown
      
  Test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install packages
        run: npm ci

      - name: Type checks
        run: npm run type-check

      - name: Test Insomnium
        working-directory: packages/insomnia
        run: npm test
        if: always() # Run this even if the previous step already failed the run

      - name: Test Insomnium Testing
        working-directory: packages/insomnia-testing
        run: npm test
        if: always() # Run this even if the previous step already failed the run

  Smoke:
    # End-to-end smoke: build the renderer + main bundles, launch electron, fire
    # one HTTP request through the native libcurl binding, assert 200 OK.
    runs-on: macos-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install packages
        run: npm ci

      - name: Build app
        run: NODE_OPTIONS='--max_old_space_size=6144' npm run app-build

      - name: Smoke test (electron + libcurl round-trip)
        run: node scripts/verify-smoke.mjs
        env:
          BUNDLE: build

  Package:
    # Catches electron-builder/native-dep regressions before they hit a release
    # branch. macOS only — windows/linux artifacts still build on release/**.
    runs-on: macos-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install packages
        run: npm ci

      - name: Package app
        run: NODE_OPTIONS='--max_old_space_size=6144' npm run app-package

      - name: Upload dmg/zip
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: macos-package-${{ github.run_number }}
          path: |
            packages/insomnia/dist/*.dmg
            packages/insomnia/dist/*.zip
          retention-days: 7
