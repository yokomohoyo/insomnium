name: CodeQL

# Static analysis for JS/TS. Findings land in the repo's "Code scanning" tab.
# Runs on every push (any branch), every PR, and weekly on a cron so newly-
# published query updates pick up issues even when nothing's been pushed.

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
  schedule:
    # Weekly, Monday 06:00 UTC. Lets weekly query-pack updates surface issues.
    - cron: "0 6 * * 1"

# Cancel duplicate runs (push + PR on the same branch) like the Test workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # "javascript-typescript" covers both .js and .ts/.tsx in one pass.
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Adds the security-and-quality query suite on top of the default,
          # which catches more code-smell / hardening issues without flooding
          # the alerts tab with noise (security-experimental is the noisy one).
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
